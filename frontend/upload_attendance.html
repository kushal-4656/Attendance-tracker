<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicaps University - Upload Attendance</title>

<!-- CSS -->
<link rel="stylesheet" href="upload_attendance.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">

<div class="logo">
<i class="fas fa-graduation-cap"></i>
<h2>Medicaps University</h2>
</div>

<a href="dashboard.html" class="back-btn">
<i class="fas fa-arrow-left"></i>
Back to Dashboard
</a>

</div>


<!-- MAIN CONTENT -->
<div class="content">

<!-- TITLE -->
<div class="page-title">
<h1><i class="fas fa-upload"></i> Upload Attendance</h1>
<p>Mark attendance for your classes</p>
</div>


<!-- DATE CARD -->
<div class="live-date-card">

<div class="date-info">
<i class="fas fa-calendar-alt"></i>
<div class="date-text" id="liveDate"></div>
</div>

<div class="time-text" id="liveTime"></div>

</div>


<!-- FORM SECTION -->
<div class="form-section">

<h3 class="section-title">
<i class="fas fa-info-circle"></i>
Class Details
</h3>

<div class="form-grid">

<!-- DEPARTMENT -->
<div class="form-group">

<label>
<i class="fas fa-building"></i>
Department
</label>

<select id="department" onchange="updateSummary()">

<option value="">Select Department</option>

<option value="Computer Science">Computer Science</option>
<option value="Information Technology">Information Technology</option>
<option value="Electrical Engineering">Electrical Engineering</option>
<option value="Electronics Engineering">Electronics Engineering</option>
<option value="Mechanical Engineering">Mechanical Engineering</option>
<option value="Civil Engineering">Civil Engineering</option>

</select>

</div>


<!-- CLASS NAME -->
<div class="form-group">

<label>
<i class="fas fa-users"></i>
Class Name
</label>

<input type="text"
id="class_name"
placeholder="e.g., B.Tech 2nd Year"
onchange="updateSummary()">

</div>

</div>

</div>


<!-- STATS CARDS -->
<div class="stats-grid">

<div class="stat-card">

<div class="stat-icon">
<i class="fas fa-users"></i>
</div>

<div class="stat-label">Total Strength</div>

<div class="stat-value">
<input
type="number"
id="total_strengthStrength"
value="0"
min="0"
onchange="validateTotalStrength()"
placeholder="Enter total">
</div>

</div>


<div class="stat-card">

<div class="stat-icon">
<i class="fas fa-user-check"></i>
</div>

<div class="stat-label">Present Students</div>

<div class="stat-value">

<input
type="number"
id="present_countCount"
value="0"
min="0"
onchange="validatePresentCount()"
placeholder="Enter present">

<small id="present_countValidation"
class="validation-message"></small>

</div>

</div>

</div>


<!-- SUMMARY -->
<div class="summary-card">

<h3 class="summary-title">
<i class="fas fa-clipboard-check"></i>
Attendance Summary
</h3>

<div class="summary-stats">

<div class="summary-item">
<div class="summary-label">Department</div>
<div class="summary-value" id="summaryDept">
Not selected
</div>
</div>

<div class="summary-item">
<div class="summary-label">Class</div>
<div class="summary-value" id="summaryClass">
Not entered
</div>
</div>

<div class="summary-item">
<div class="summary-label">Total</div>
<div class="summary-value" id="summaryTotal">0</div>
</div>

<div class="summary-item">
<div class="summary-label">Present</div>
<div class="summary-value present_count"
id="summaryPresent">0</div>
</div>

<div class="summary-item">
<div class="summary-label">Absent</div>
<div class="summary-value absent"
id="summaryAbsent">0</div>
</div>

<div class="summary-item">
<div class="summary-label">Attendance %</div>
<div class="summary-value"
id="summaryPercentage">0%</div>
</div>

</div>

</div>


<!-- BUTTONS -->
<div class="action-buttons">

<button
class="btn btn-secondary"
onclick="resetForm()">

<i class="fas fa-redo"></i>
Reset

</button>


<button
class="btn btn-primary"
onclick="submitAttendance()"
id="submitBtn">

<i class="fas fa-save"></i>
Save Attendance

</button>

</div>

</div>

</div>


<!-- TOAST -->
<div id="toast" class="toast"></div>


<!-- JS -->
<script src="upload_attendance.js"></script>

</body>
</html>
