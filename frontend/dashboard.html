<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicaps University - Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- Header -->
<div class="header">
<div class="logo">
<i class="fas fa-graduation-cap"></i>
<h2>Medicaps University</h2>
</div>

<button class="logout-btn" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Logout
</button>
</div>


<!-- Welcome Section -->
<div class="welcome-section">
<h1>Welcome, <span id="userName">Faculty</span>!</h1>

<div class="date-time">
<i class="far fa-calendar-alt"></i>
<span id="dateTime"></span>
</div>
</div>


<!-- Quick Stats -->
<div class="quick-stats">

<div class="stat-item">
<i class="fas fa-calendar-check"></i>
<div class="label">Today's Attendance</div>
<div class="value" id="todayCount">0</div>
</div>

<div class="stat-item">
<i class="fas fa-users"></i>
<div class="label">Total Students</div>
<div class="value" id="totalStudents">0</div>
</div>

<div class="stat-item">
<i class="fas fa-chart-line"></i>
<div class="label">Avg. Attendance</div>
<div class="value" id="avgAttendance">0%</div>
</div>

<div class="stat-item">
<i class="fas fa-clock"></i>
<div class="label">This Week</div>
<div class="value" id="weekCount">0</div>
</div>

</div>


<!-- Dashboard Cards -->
<div class="dashboard-cards">

<a href="upload_attendance.html" class="card">
<div class="card-icon">
<i class="fas fa-upload"></i>
</div>
<h3>Upload Attendance</h3>
<p>Mark attendance for your classes</p>

<button class="card-btn"
onclick="event.preventDefault(); window.location.href='upload_attendance.html'">
<i class="fas fa-arrow-right"></i> Upload Now
</button>

</a>


<a href="view_attendance.html" class="card">
<div class="card-icon">
<i class="fas fa-eye"></i>
</div>

<h3>View Attendance</h3>
<p>Check attendance records with filters</p>

<button class="card-btn"
onclick="event.preventDefault(); window.location.href='view_attendance.html'">
<i class="fas fa-arrow-right"></i> View Now
</button>

</a>

</div>


<!-- Recent Activity -->
<div class="recent-activity">

<div class="section-header">
<h3><i class="fas fa-history"></i> Recent Attendance Records</h3>

<a href="view_attendance.html" class="view-all">
View All <i class="fas fa-arrow-right"></i>
</a>
</div>

<div class="activity-list" id="recentActivity"></div>

</div>

</div>


<div id="toast" class="toast"></div>

<div id="loadingOverlay" class="loading-overlay">
<div class="spinner"></div>
<p>Loading...</p>
</div>


<script src="dashboard.js"></script>

</body>
</html>
